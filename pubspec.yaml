name: fresh_basket
description: FreshBasket - Premium fresh fruits and vegetables delivery app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_remote_config: ^5.1.3
  google_sign_in: ^6.2.1

  # State Management & DI
  flutter_riverpod: ^2.5.1
  get_it: ^8.0.2

  # Routing
  go_router: ^14.3.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^2.1.1

  # UI & Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0+3
  flutter_slidable: ^3.1.1
  salomon_bottom_bar: ^3.3.2
  fl_chart: ^0.69.0
  pinput: ^5.0.0
  dotted_border: ^2.1.0
  badges: ^3.1.2
  skeletonizer: ^1.4.2
  pull_to_refresh: ^2.0.0

  # Networking & Utils
  dio: ^5.7.0
  connectivity_plus: ^6.0.5
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  intl: ^0.20.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.2.1
  mailer: ^6.2.0
  package_info_plus: ^8.1.1
  device_info_plus: ^11.1.1
  timeago: ^3.7.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  dart_jsonwebtoken: ^2.14.3
  flutter_local_notifications: ^17.2.4
  qr_flutter: ^4.1.0
  cupertino_icons: ^1.0.8
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  mockito: ^5.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/fresh_basket_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/fresh_basket_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  # Solid brand green — no separate logo so the only visual
  # splash the user sees is the animated Flutter SplashPage.
  color: "#2E9E2E"
  color_dark: "#2E9E2E"
  android_12:
    color: "#2E9E2E"
    color_dark: "#2E9E2E"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
